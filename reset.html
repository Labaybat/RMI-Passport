<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="index-page">
  <div class="auth-center-container">
    <div class="container">
      <h1 class="login-title">RMI PASSPORT PORTAL</h1>
      <div class="login-avatar">
        <svg viewBox="0 0 24 24" width="72" height="72" fill="#cccccc">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6v1H4v-1z"/>
        </svg>
      </div>
      <h2 class="login-subtitle">Reset Password</h2>

      <form id="reset-form">
        <input type="password" id="new-password" placeholder="New Password" required />
        <input type="password" id="confirm-password" placeholder="Retype New Password" required />
        <div id="error-message" class="error-message" style="display:none; text-align:center; margin: 10px 0;"></div>
        <button type="submit" class="submit-btn">Reset Password</button>
      </form>

      <p class="footer">PASSPORT</p>
    </div>
  </div>

  <script type="module" src="reset-auth.js"></script>
</body>
</html>
