<script>
  let hideTimeout;
  const profileMenu = document.getElementById('profileMenu');

  function showMenu() {
    clearTimeout(hideTimeout);
    profileMenu.style.display = 'block';
  }

  function hideMenuWithDelay() {
    hideTimeout = setTimeout(() => {
      profileMenu.style.display = 'none';
    }, 2000); // 2 second delay
  }
