
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 600px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      margin-top: 0;
    }
    .application {
      background: #f9f9f9;
      padding: 15px;
      margin-top: 15px;
      border-left: 5px solid #007BFF;
    }
    .no-app {
      color: #777;
      margin-top: 20px;
    }
    .actions {
      margin-top: 20px;
    }
    button {
      padding: 10px 15px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Welcome to Your Dashboard</h2>
    <div id="user-info"></div>
    <div id="application-info" class="application"></div>
    <p id="no-application" class="no-app" style="display: none;">You have not submitted any application yet.</p>
    <div class="actions">
      <button onclick="window.location.href='apply.html'">Apply Now</button>
      <button id="logout-btn" style="background: #dc3545;">Logout</button>
    </div>
  </div>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
