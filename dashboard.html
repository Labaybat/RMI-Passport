
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - RMI Passport</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-section">
    <h1>Welcome to Your Passport Dashboard</h1>
    <p>Use the options below to manage your application.</p>
    <a href="apply.html">📝 Start Application</a>
    <a href="status.html">📊 Application Status</a>
    <a href="passport-act.html">📄 View Passport Act</a>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <script type="module" src="auth.js"></script>

  <script type="module">
    import { supabase } from './supabase.js';

    window.logout = async function () {
      await supabase.auth.signOut();
      window.location.href = 'index.html';
    };
  </script>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>
<script src="supabase.js"></script>
<script>
  supabase.auth.getUser().then(({ data, error }) => {
    if (!data?.user) {
      alert("You must be logged in to access this page.");
      window.location.href = "index.html";
    }
  });
</script>

</body>
</html>
