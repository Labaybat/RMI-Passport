
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - RMI Passport</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .dashboard-section {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .dashboard-section h1 {
      margin-bottom: 0.5rem;
    }

    .dashboard-section p {
      margin-bottom: 1.5rem;
      color: #555;
    }

    .dashboard-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .dashboard-buttons a {
      padding: 12px 20px;
      background-color: #007bff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .dashboard-buttons a:hover {
      background-color: #0056b3;
    }

    .logout-btn {
      padding: 10px 18px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .logout-btn:hover {
      background-color: #a71d2a;
    }
  </style>
</head>
<body>
  <div class="dashboard-section">
    <h1>Welcome to Your Passport Dashboard</h1>
    <p>Use the options below to manage your application.</p>
    <div class="dashboard-buttons">
      <a href="apply.html">📝 Start Application</a>
      <a href="status.html">📊 Application Status</a>
      <a href="passport-act.html">📄 View Passport Act</a>
    </div>
    <button class="logout-btn">Logout</button>
  </div>

  <script type="module">
    import { supabase } from './supabase.js';

    supabase.auth.getSession().then(({ data: { session } }) => {
      if (!session) {
        window.location.href = 'index.html';
      }
    });

    document.querySelector('.logout-btn')?.addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
