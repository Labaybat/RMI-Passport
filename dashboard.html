
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4fa; padding: 2em; }
    .container { max-width: 800px; margin: auto; background: white; padding: 2em; border-radius: 8px; }
    h2 { text-align: center; color: #002b5c; }
    table { width: 100%; border-collapse: collapse; margin-top: 1em; }
    th, td { padding: 0.75em; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #002b5c; color: white; }
  </style>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabase = createClient(
      'https://svkusntallxdxrsgdqzt.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2a3VzbnRhbGx4ZHhyc2dkcXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY0OTE3NjMsImV4cCI6MjA2MjA2Nzc2M30.-vsOMTTOo8cX5ejbIjwoEGskFx_FZ-yYqVX4EbSDPGQ'
    );

    document.addEventListener("DOMContentLoaded", async () => {
      const { data: { user } } = await supabase.auth.getUser();

      if (!user) {
        window.location.href = "/login.html";
        return;
      }

      document.getElementById("userEmail").textContent = user.email;

      const { data, error } = await supabase
        .from("passport_applications")
        .select("*")
        .eq("user_id", user.id)
        .order("created_at", { ascending: false });

      if (error) {
        console.error("Error fetching applications:", error);
        return;
      }

      const tbody = document.querySelector("tbody");
      if (data.length === 0) {
        tbody.innerHTML = "<tr><td colspan='5'>No applications found.</td></tr>";
      } else {
        tbody.innerHTML = "";
        data.forEach(app => {
          const row = `<tr>
            <td>${new Date(app.created_at).toLocaleDateString()}</td>
            <td>${app.passport_type}</td>
            <td>${app.email || '-'}</td>
            <td>${app.status || 'Pending'}</td>
            <td>${app.signature ? `<a href="${app.signature}" target="_blank">View</a>` : '-'}</td>
          </tr>`;
          tbody.insertAdjacentHTML("beforeend", row);
        });
      }
    });
  </script>
</head>
<body>
  <div class="container">
    <h2>User Dashboard</h2>
    <p>Welcome, <strong id="userEmail"></strong></p>
    <table>
      <thead>
        <tr>
          <th>Date Submitted</th>
          <th>Passport Type</th>
          <th>Email</th>
          <th>Status</th>
          <th>Signature</th>
        </tr>
      </thead>
      <tbody>
        <tr><td colspan="5">Loading...</td></tr>
      </tbody>
    </table>
  </div>
<script type="module" src="dashboard.js"></script>
</body>
</html>
