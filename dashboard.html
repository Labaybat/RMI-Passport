<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>User Dashboard – Passport Portal</title>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="styles.css" rel="stylesheet"/>
<script src="auth.js" type="module"></script>
<style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 20px;
    }
    .dashboard {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      color: #003366;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
    th {
      background-color: #003366;
      color: white;
    }
    .status {
      font-weight: bold;
      color: #003366;
    }
  </style>

</head>
<body><a href="login.html" id="auth-button">Login</a>
<div class="dashboard">
<h1>User Dashboard</h1>
<p>Welcome, <strong id="user-email">loading...</strong></p>
<table>
<thead>
<tr>
<th>Date Submitted</th>
<th>Passport Type</th>
<th>Signed On</th>
<th>Status</th>
</tr>
</thead>
<tbody id="app-table">
<tr><td colspan="4">Loading applications...</td></tr>
</tbody>
</table>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabase = createClient('https://svkusntallxdxrsgdqzt.supabase.co', 'public-anon-key');
const { data: { user } } = await supabase.auth.getUser();
const btn = document.getElementById("auth-button");
if (btn) {
  if (user) {
    btn.textContent = "Logout";
    btn.href = "#";
    btn.onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    };
  } else {
    btn.textContent = "Login";
    btn.href = "login.html";
  }
}
</script></body>
</html>
