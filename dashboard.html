
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Applications - RMI Passport Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      margin: 0;
      padding: 2rem;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      margin-bottom: 2rem;
    }
    .application {
      border-bottom: 1px solid #ddd;
      padding: 1rem 0;
    }
    .application:last-child {
      border-bottom: none;
    }
    .app-header {
      display: flex;
      justify-content: space-between;
      font-weight: bold;
    }
    .app-actions {
      margin-top: 0.5rem;
    }
    .app-actions button {
      padding: 5px 10px;
      margin-right: 5px;
      border: none;
      background: #007BFF;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .app-actions button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>My Passport Applications</h2>
    <div id="applications-list">Loading...</div>
  </div>

  
  <script>
    async function loadApplications() {
      const { data: sessionData, error: sessionError } = await supabase.auth.getUser();
      if (!sessionData?.user) {
        alert("You must be logged in.");
        window.location.href = "index.html";
        return;
      }

      const userId = sessionData.user.id;
      const { data, error } = await supabase
        .from("passport_applications")
        .select("*")
        .eq("user_id", userId)
        .order("submitted_at", { ascending: false });

      const container = document.getElementById("applications-list");
      if (error || !data.length) {
        container.innerHTML = "<p>No applications found.</p>";
        return;
      }

      container.innerHTML = "";
      data.forEach(app => {
        const div = document.createElement("div");
        div.className = "application";
        div.innerHTML = \`
          <div class="app-header">
            <span>\${app.application_type?.toUpperCase()} - \${app.status}</span>
            <span>\${new Date(app.submitted_at || app.updated_at).toLocaleDateString()}</span>
          </div>
          <div><strong>Name:</strong> \${app.first_middle_names} \${app.surname}</div>
          <div class="app-actions">
            <button onclick="editApplication('\${app.id}')">Edit</button>
          </div>
        \`;
        container.appendChild(div);
      });
    }

    function editApplication(id) {
      localStorage.setItem('editingApplicationId', id);
      // Optionally: Store app ID in localStorage/session for later use
      // For now, redirect to apply.html
      window.location.href = "apply.html";
    }

    loadApplications();
  </script>

<script>
  supabase.auth.getUser().then(({ data, error }) => {
    if (!data?.user) {
      alert("You must be logged in to access this page.");
      window.location.href = "index.html";
    }
  });
</script>

</body>
</html>
