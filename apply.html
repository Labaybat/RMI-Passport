
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apply for Passport</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="form.js"></script>
</head>
<body>
  <header>
    <h1>Passport Application</h1>
    <p>Please complete the form below.</p>
  </header>

  <main class="container">
    <div class="card">
      <form id="passport-form">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" required />

        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" required />

        <label for="passport-type">Passport Type</label>
        <select id="passport-type" name="passport-type" required>
          <option value="">Select...</option>
          <option value="standard">Standard</option>
          <option value="diplomatic">Diplomatic</option>
        </select>

        <label for="photo">Upload Photo</label>
        <input type="file" id="photo" name="photo" accept="image/*" required />

        <input type="submit" value="Submit Application" />
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 RMI Government. All rights reserved.</p>
  </footer>
</body>
</html>
