<!DOCTYPE html>

<body>
  <div class="form-container">
    
    <h1>Marshall Islands Passport Application Form</h1><br></div>
    
<div style="text-align:center; margin-top: 20px;">
    <img src="seal.png" alt="Seal of the Marshall Islands" style="max-width: 120px; display: block; margin: 0 auto;">
    <h2 style="margin-top: 10px; font-size: 20px; color: #003366;">Passport Application Form</h2>
</div>

<form id="passportForm" style="max-width: 600px; margin: 20px auto; padding: 20px; background: #ffffff; box-shadow: 0 0 10px rgba(0,0,0,0.1); border-radius: 8px;">
    <div class="form-step step-1">
        <label>First Name:</label><br><input type="text" name="firstName" required><br><br>
        <label>Last Name:</label><br><input type="text" name="lastName" required><br><br>
        <label>Date of Birth:</label><br><input type="date" name="dob" required><br><br>
        <label>Place of Birth:</label><br><input type="text" name="birthPlace" required><br><br>
    </div>
    <div class="form-step step-2" style="display: none;">
        <label>Nationality:</label><br><input type="text" name="nationality"><br><br>
        <label>Sex:</label><br><input type="text" name="sex"><br><br>
        <label>Height:</label><br><input type="text" name="height"><br><br>
        <label>Eye Color:</label><br><input type="text" name="eyeColor"><br><br>
    </div>
    <div class="form-step step-3" style="display: none;">
        <label>Hair Color:</label><br><input type="text" name="hairColor"><br><br>
        <label>Home Address:</label><br><input type="text" name="homeAddress"><br><br>
        <!-- More fields can continue here... -->
    </div>

    <div style="text-align: center;">
        <button type="button" onclick="prevStep()">Back</button>
        <button type="button" onclick="saveProgress()">Save</button>
        <button type="button" onclick="nextStep()">Next</button>
    </div>
</form>

<script>
let currentStep = 1;
function showStep(step) {
    document.querySelectorAll('.form-step').forEach((el, index) => {
        el.style.display = (index + 1 === step) ? 'block' : 'none';
    });
}
function nextStep() {
    if (currentStep < 3) currentStep++;
    showStep(currentStep);
}
function prevStep() {
    if (currentStep > 1) currentStep--;
    showStep(currentStep);
}
function saveProgress() {
    const form = document.getElementById('passportForm');
    const formData = new FormData(form);
    for (let [name, value] of formData.entries()) {
        localStorage.setItem(name, value);
    }
    alert('Progress saved.');
}
window.onload = function() {
    const form = document.getElementById('passportForm');
    form.querySelectorAll('input').forEach(input => {
        const saved = localStorage.getItem(input.name);
        if (saved) input.value = saved;
    });
    showStep(currentStep);
};
</script>

  </div>
