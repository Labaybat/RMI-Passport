</div>
<div class="form-step">
<label for="field20">Have you ever held a Marshallese passport?:</label>
      <input id="field22" type="radio" name="hasPassport" value="Yes" required> Yes
      <input id="field22" type="radio" name="hasPassport" value="No"> No

<div class="buttons">

  <button type="submit" id="submitButton" style="display: none;">Submit</button>

<script>
document.addEventListener("DOMContentLoaded", function () {
  let currentStep = 0;
  const steps = document.querySelectorAll(".form-step");
  const nextBtn = document.getElementById("nextButton");
  const backBtn = document.getElementById("backButton");
  const submitBtn = document.getElementById("submitButton");
  const progressBar = document.getElementById("progressBar");

  function showStep(index) {
    steps.forEach((step, i) => {
      step.classList.toggle("active", i === index);
    });
    if (index === 0) {
      backBtn.style.display = "none";
    } else {
      backBtn.style.display = "inline-block";
    }
    if (index === steps.length - 1) {
      nextBtn.style.display = "none";
      submitBtn.style.display = "inline-block";
    } else {
      nextBtn.style.display = "inline-block";
      submitBtn.style.display = "none";
    }
    updateProgress(index);
  }

  function updateProgress(index) {
    const percent = ((index + 1) / steps.length) * 100;
    if (progressBar) {
      progressBar.style.width = percent + "%";
    }
  }

  if (nextBtn) {
    nextBtn.addEventListener("click", () => {
      if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
      }
    });
  }

  if (backBtn) {
    backBtn.addEventListener("click", () => {
      if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
      }
    });
  }

  showStep(currentStep);
});
</script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://injquzndhzqcamtenbum.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImluanF1em5kaHpxY2FtdGVuYnVtIiwicm9sZSI6InB1YmxpYyIsImlhdCI6MTcwNzQxMDE2MSwiZXhwIjoyMDIzOTg2MTYxfQ.YmH6WqJ3Nk6FbN-QvdqAf4nEPBhnp9Y3ExaUob-AzDI'
);

let currentStep = 0;
const steps = document.querySelectorAll(".form-step");
const nextBtn = document.getElementById("nextButton");
const backBtn = document.getElementById("backButton");
const submitBtn = document.getElementById("submitButton");
const progressBar = document.getElementById("progressBar");
const form = document.getElementById("passport-form");

// Load existing application if logged in
async function loadSavedData() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const user = session.user;
    const { data, error } = await supabase
      .from("passport_applications")
      .select("*")
      .eq("user_id", user.id)
      .single();

    if (data && data.form_data) {
      Object.entries(data.form_data).forEach(([key, value]) => {
        const el = document.querySelector(`[name='${key}']`);
        if (el) el.value = value;
      });
    }
  }
}

// Save current step data
async function saveCurrentStep() {
  const formData = new FormData(form);
  const dataToSave = {};
  formData.forEach((val, key) => dataToSave[key] = val);

  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const user = session.user;
    await supabase
      .from("passport_applications")
      .upsert([{ user_id: user.id, form_data: dataToSave }], { onConflict: 'user_id' });
  }
}

// Navigation and display logic
function showStep(index) {
  steps.forEach((step, i) => step.classList.toggle("active", i === index));
  updateProgress(index);
  if (index === 0) {
    backBtn.style.display = "none";
  } else {
    backBtn.style.display = "inline-block";
  }
  if (index === steps.length - 1) {
    nextBtn.style.display = "none";
    submitBtn.style.display = "inline-block";
  } else {
    nextBtn.style.display = "inline-block";
    submitBtn.style.display = "none";
  }
}

function updateProgress(index) {
  const percent = ((index + 1) / steps.length) * 100;
  if (progressBar) {
    progressBar.style.width = percent + "%";
  }
}

// Event listeners
if (nextBtn) {
  nextBtn.addEventListener("click", async () => {
    await saveCurrentStep();
    if (currentStep < steps.length - 1) {
      currentStep++;
      showStep(currentStep);
    }
  });
}

if (backBtn) {
  backBtn.addEventListener("click", () => {
    if (currentStep > 0) {
      currentStep--;
      showStep(currentStep);
    }
  });
}

document.addEventListener("DOMContentLoaded", async () => {
  await loadSavedData();
  showStep(currentStep);
});
</script>
