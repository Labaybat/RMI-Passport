
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Passport Application</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Passport Application</h1>
  <form id="application-form">
      <label>Application Type</label>
      <select name="application_type" required>
        <option value="">Select</option>
        <option value="new">New Passport</option>
        <option value="renewal">Passport Renewal</option>
      </select>
    <!-- Step 1: Personal Info -->
    <div class="step" id="step-1">
      <h2>Personal Information</h2>
      <input type="text" name="surname" placeholder="Surname or Family Name" required />
      <input type="text" name="first_middle_names" placeholder="First and Middle Names" required />
      <input type="text" name="social_security_number" placeholder="Social Security Number" required />
      <input type="text" name="place_of_birth_city" placeholder="City or Town of Birth" required />
      <input type="text" name="place_of_birth_state" placeholder="State (if in U.S.)" />
      <input type="text" name="country_of_birth" placeholder="Country of Birth" required />
      <input type="date" name="date_of_birth" required />
      <input type="text" name="gender" placeholder="Gender" required />
      <input type="text" name="hair_color" placeholder="Hair Color" required />
      <input type="text" name="marital_status" placeholder="Marital Status" required />
      <input type="number" name="height_feet" placeholder="Height (Feet)" required />
      <input type="number" name="height_inches" placeholder="Height (Inches)" required />
      <input type="text" name="eye_color" placeholder="Eye Color" required />
      <button type="button" id="next-btn">Next</button>
    </div>
    <!-- Other steps hidden initially -->
  </form>
  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js';

    const supabase = createClient(
      'https://eiuviyizjnfmswfrdigo.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdXZpeWl6am5mbXN3ZnJkaWdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY2Nzc1MDIsImV4cCI6MjA2MjI1MzUwMn0.M1E6xOKAc8fsiVkXAxorr1QCRqRedcDv-GNa9CuAE4M'
    );

    let currentStep = 1;
    let userId = null;
    let applicationId = null;

    async function getUser() {
      const { data, error } = await supabase.auth.getUser();
      if (data?.user?.id) {
        userId = data.user.id;
        console.log("User ID:", userId);
      } else {
        alert("Failed to fetch user session.");
      }
    }

    async function saveStep() {
      const form = document.getElementById('application-form');
      const formData = new FormData(form);
      const stepData = {};
      formData.forEach((value, key) => {
        if (!(value instanceof File)) stepData[key] = value;
      });

      if (!userId) await getUser();
      if (!userId) return;

      if (!applicationId) {
        const { data, error } = await supabase
          .from('passport_applications')
          .insert([{ user_id: userId, status: 'draft', ...stepData }])
          .select()
          .single();
        if (data) {
          applicationId = data.id;
          console.log("Created application ID:", applicationId);
        } else if (error) {
          console.error("Insert error:", error);
        }
      } else {
        const { error } = await supabase
          .from('passport_applications')
          .update({ ...stepData, updated_at: new Date().toISOString() })
          .eq('id', applicationId);
        if (error) console.error("Update error:", error);
      }
    }

    function nextStep() {
      document.getElementById(`step-${currentStep}`).style.display = 'none';
      currentStep++;
      const next = document.getElementById(`step-${currentStep}`);
      if (next) next.style.display = 'block';
      saveStep();
    }

    document.getElementById("next-btn").addEventListener("click", nextStep);

    getUser();
  </script>
</body>
</html>
