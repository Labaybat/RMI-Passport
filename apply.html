
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passport Application</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-200">

  <!-- Loader -->
  <div id="loader" class="loader-overlay hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
    <div class="loader border-8 border-gray-300 border-t-blue-600 rounded-full w-16 h-16 animate-spin"></div>
  </div>

  <main class="container mx-auto max-w-xl mt-10 p-6 bg-white dark:bg-gray-800 rounded-lg shadow-md">
    <h1 class="text-2xl font-bold text-center mb-6">Passport Application</h1>
    <form id="application-form" class="space-y-6">

      <!-- Step 1 -->
      <div class="step" id="step-1">
        <h2 class="text-lg font-semibold mb-4 text-center">Step 1: Personal Info</h2>
        <div class="mb-4">
          <label for="application_type" class="block mb-1">Application Type</label>
          <select id="application_type" name="application_type" class="form-select w-full" required>
            <option value="">Select Type</option>
            <option value="new">New</option>
            <option value="renewal">Renewal</option>
          </select>
        </div>
        <div class="mb-4">
          <label for="full_name" class="block mb-1">Full Name</label>
          <input type="text" id="full_name" name="full_name" class="form-control" required />
        </div>
        <div class="mb-4">
          <label for="dob" class="block mb-1">Date of Birth</label>
          <input type="date" id="dob" name="dob" class="form-control" required />
        </div>
        <div class="text-center">
          <button type="button" class="btn btn-secondary" id="next-1">Next</button>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="step hidden" id="step-2">
        <h2 class="text-lg font-semibold mb-4 text-center">Step 2: Contact Details</h2>
        <div class="mb-4">
          <label for="email" class="block mb-1">Email</label>
          <input type="email" id="email" name="email" class="form-control" required />
        </div>
        <div class="mb-4">
          <label for="phone" class="block mb-1">Phone Number</label>
          <input type="tel" id="phone" name="phone" class="form-control" required />
        </div>
        <div class="mb-4">
          <label for="address" class="block mb-1">Address</label>
          <textarea id="address" name="address" rows="3" class="form-control" required></textarea>
        </div>
        <div class="d-flex justify-content-between">
          <button type="button" class="btn btn-outline-secondary" id="back-2">Back</button>
          <button type="button" class="btn btn-secondary" id="next-2">Next</button>
        </div>
      </div>

      <!-- Step 3 -->
      <div class="step hidden" id="step-3">
        <h2 class="text-lg font-semibold mb-4 text-center">Step 3: Document Upload</h2>
        <div class="mb-4">
          <label for="document" class="block mb-1">Upload ID Document</label>
          <input type="file" id="document" name="document" class="form-control" required />
        </div>
        <div class="d-flex justify-content-between">
          <button type="button" class="btn btn-outline-secondary" id="back-3">Back</button>
          <button type="submit" class="btn btn-primary" id="submit-button">Submit</button>
        </div>
      </div>
    </form>
  </main>

  <script src="form.js"></script>
</body>
</html>
