
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Passport Application</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
  <h1>Passport Application</h1>
  <form id="application-form">
    <h2 class="section-title">Personal Information</h2>
    <!-- Step 1: Personal Info -->
    <div class="step" id="step-1">
      <h2>Personal Information</h2>
      <label>Application Type</label>
      <select name="application_type" required>
        <option value="">Select</option>
        <option value="new">New Passport</option>
        <option value="renewal">Passport Renewal</option>
      </select>
      <input type="text" name="surname" placeholder="Surname or Family Name" required />
      <input type="text" name="first_middle_names" placeholder="First and Middle Names" required />
      <input type="text" name="social_security_number" placeholder="Social Security Number" required />
      <input type="text" name="place_of_birth_city" placeholder="City or Town of Birth" required />
      <input type="text" name="place_of_birth_state" placeholder="State (if in U.S.)" />
      <input type="text" name="country_of_birth" placeholder="Country of Birth" required />
      <input type="date" name="date_of_birth" required />
      <input type="text" name="gender" placeholder="Gender" required />
      <input type="text" name="hair_color" placeholder="Hair Color" required />
      <input type="text" name="marital_status" placeholder="Marital Status" required />
      <input type="number" name="height_feet" placeholder="Height (Feet)" required />
      <input type="number" name="height_inches" placeholder="Height (Inches)" required />
      <input type="text" name="eye_color" placeholder="Eye Color" required />
      <button type="button" class="next-btn">Next</button>
    </div>

    <!-- Step 2: Contact Info -->
    <div class="step" id="step-2" style="display:none;">
      <h2>Contact and Delivery</h2>
      <input type="text" name="address_unit" placeholder="Unit and/or House Number" required />
      <input type="text" name="street_name" placeholder="Street Name" required />
      <input type="text" name="phone_number" placeholder="Phone Number" required />
      <input type="text" name="city" placeholder="City or Town" required />
      <input type="text" name="state" placeholder="State" required />
      <input type="text" name="postal_code" placeholder="Postal Code" required />
      <button type="button" class="prev-btn">Back</button>
      <button type="button" class="next-btn">Next</button>
    </div>

    <!-- Step 3: Emergency Contact -->
    <div class="step" id="step-3" style="display:none;">
      <h2>Emergency Contact</h2>
      <input type="text" name="emergency_full_name" placeholder="Full Name" required />
      <input type="text" name="emergency_phone_number" placeholder="Phone Number" required />
      <input type="text" name="emergency_address_unit" placeholder="Unit and/or House Number" required />
      <input type="text" name="emergency_street_name" placeholder="Street Name" required />
      <input type="text" name="emergency_city" placeholder="City or Town" required />
      <input type="text" name="emergency_state" placeholder="State" required />
      <input type="text" name="emergency_postal_code" placeholder="Postal Code" required />
      <button type="button" class="prev-btn">Back</button>
      <button type="button" class="next-btn">Next</button>
    </div>

    <!-- Step 4: Parent Info -->
    <div class="step" id="step-4" style="display:none;">
      <h2>Parent Details</h2>
      <h3>Father</h3>
      <input type="text" name="father_full_name" placeholder="Father's Full Name" required />
      <input type="date" name="father_dob" required />
      <input type="text" name="father_nationality" placeholder="Nationality" required />
      <input type="text" name="father_birth_city" placeholder="City or Town" required />
      <input type="text" name="father_birth_state" placeholder="State" />
      <input type="text" name="father_birth_country" placeholder="Country" required />
      <h3>Mother</h3>
      <input type="text" name="mother_full_name" placeholder="Mother's Full Name" required />
      <input type="date" name="mother_dob" required />
      <input type="text" name="mother_nationality" placeholder="Nationality" required />
      <input type="text" name="mother_birth_city" placeholder="City or Town" required />
      <input type="text" name="mother_birth_state" placeholder="State" />
      <input type="text" name="mother_birth_country" placeholder="Country" required />
      <button type="button" class="prev-btn">Back</button>
      <button type="button" class="next-btn">Next</button>
    </div>

    <!-- Step 5: Uploads -->
    <div class="step" id="step-5" style="display:none;">
      <h2>Document Uploads</h2>
      <label for="birth_certificate">Birth Certificate</label>
      <label>Upload a copy of your old passport (if applicable):</label>
<input type="file" name="birth_certificate" id="birth_certificate" accept=".pdf,.jpg,.jpeg,.png" />

      <label for="consent_form">Consent Form</label>
      <label>Upload your Birth Certificate:</label>
<input type="file" name="consent_form" id="consent_form" accept=".pdf,.jpg,.jpeg,.png" />

      <label for="marriage_or_divorce_certificate">Marriage or Divorce Certificate</label>
      <label>Upload Consent Form:</label>
<input type="file" name="marriage_or_divorce_certificate" id="marriage_or_divorce_certificate" accept=".pdf,.jpg,.jpeg,.png" />

      <label for="old_passport_copy">Old Passport (if any)</label>
      <label>Upload Marriage Certificate (if applicable):</label>
<input type="file" name="old_passport_copy" id="old_passport_copy" accept=".pdf,.jpg,.jpeg,.png" />

      <label for="signature">Signature</label>
      <label>Upload Divorce Certificate (if applicable):</label>
<input type="file" name="signature" id="signature" accept=".png,.jpg,.jpeg" />

      <label for="photo_id">Photo ID</label>
      <label>Upload File 6:</label>
<input type="file" name="photo_id" id="photo_id" accept=".jpg,.jpeg,.png" />
      <label>Upload File 7:</label>
<input type="file" name="birth_certificate" accept=".pdf,.jpg,.jpeg,.png" />
      <label>Upload File 8:</label>
<input type="file" name="consent_form" accept=".pdf,.jpg,.jpeg,.png" />
      <label>Upload File 9:</label>
<input type="file" name="marriage_or_divorce_certificate" accept=".pdf,.jpg,.jpeg,.png" />
      <label>Upload File 10:</label>
<input type="file" name="old_passport_copy" accept=".pdf,.jpg,.jpeg,.png" />
      <label>Upload File 11:</label>
<input type="file" name="signature" accept=".png,.jpg,.jpeg" />
      <label>Upload File 12:</label>
<input type="file" name="photo_id" accept=".jpg,.jpeg,.png" />
      <button type="button" class="prev-btn">Back</button>
      <button type="button" class="next-btn">Next</button>
    </div>

    <!-- Step 6: Review & Submit -->
    <div class="step" id="step-6" style="display:none;">
      <h2>Review & Submit</h2>
      <p>Please review your details before submitting.</p>
      <button type="button" class="prev-btn">Back</button>
      <button type="submit">Submit</button>
    </div>
  </form>
  </div>
  <script type="module" src="form.js"></script>

<script type="module">
  import { supabase } from './supabase.js';

  // Redirect to login page if not logged in
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (!session) {
      alert("Please log in to access this page.");
      window.location.href = 'index.html';
    }
  });
</script>


<script>
  document.addEventListener("DOMContentLoaded", () => {
    const appTypeSelect = document.querySelector('select[name="application_type"]');
    const oldPassportGroup = document.getElementById("old-passport-group");
    const birthCertGroup = document.getElementById("birth-cert-group");

    function toggleFields() {
      const type = appTypeSelect.value;
      if (type === "renewal") {
        if (oldPassportGroup) oldPassportGroup.style.display = "block";
        if (birthCertGroup) birthCertGroup.style.display = "none";
      } else if (type === "new") {
        if (oldPassportGroup) oldPassportGroup.style.display = "none";
        if (birthCertGroup) birthCertGroup.style.display = "block";
      } else {
        if (oldPassportGroup) oldPassportGroup.style.display = "none";
        if (birthCertGroup) birthCertGroup.style.display = "none";
      }
    }

    appTypeSelect.addEventListener("change", toggleFields);
    toggleFields();
  });
</script>

</body>
</html>
