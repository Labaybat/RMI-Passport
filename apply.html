
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marshall Islands Passport Application Form</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: url('seal.png') no-repeat center center fixed; background-size: 400px; opacity: 1; }
    .form-container { background-color: rgba(255,255,255,0.95); }
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background-color: #f5f5f5;
    }
    .form-container {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      max-width: 800px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    label {
      display: block;
      margin: 1rem 0 0.2rem;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 0.5rem;
      margin-bottom: 1rem;
    }
    button {
      background-color: #2c3e50;
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>

<style>
  .form-step {
    display: none;
  }
  .form-step.active {
    display: block;
  }
  .progress-container {
    width: 100%;
    background: #ddd;
    height: 10px;
    margin-bottom: 1rem;
    border-radius: 5px;
    overflow: hidden;
  }
  .progress-bar {
    height: 10px;
    background: #2c3e50;
    width: 0%;
    transition: width 0.3s ease-in-out;
  }
  .buttons {
    text-align: center;
    margin-top: 2rem;
  }
  .buttons button {
    padding: 0.8rem 1.5rem;
    margin: 0 0.5rem;
    border: none;
    background-color: #2c3e50;
    color: white;
    border-radius: 4px;
    cursor: pointer;
  }
  .buttons button:hover {
    background-color: #34495e;
  }
</style>

</head>
<body>
  <div class="form-container">
    <img src="seal.png" alt="RMI Seal" width="100" style="margin-bottom: 1rem;" />
    <h1>Marshall Islands Passport Application Form</h1>
    
<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

<form id="passport-form">
<div class="form-step active">

      <label>First Name:</label>
      <input type="text" name="firstName" required>
      <label>Last Name:</label>
      <input type="text" name="lastName" required>
      <label>Date of Birth:</label>
      <input type="date" name="dob" required>
      
</div>
<div class="form-step">
<label>Place of Birth:</label>
      <input type="text" name="birthPlace" required>
      <label>Nationality:</label>
      <input type="text" name="nationality" required>
      <label>Sex:</label>
      <select name="sex">
        <option>Male</option>
        <option>Female</option>
      </select>
      <label>Height (ft/in):</label>
      <input type="text" name="height">
      
</div>
<div class="form-step">
<label>Eye Color:</label>
      <input type="text" name="eyeColor">
      <label>Hair Color:</label>
      <input type="text" name="hairColor">
      <label>Home Address:</label>
      <input type="text" name="homeAddress">
      <label>Mailing Address:</label>
      <input type="text" name="mailingAddress">
      
</div>
<div class="form-step">
<label>Phone:</label>
      <input type="text" name="phone">
      <label>Email:</label>
      <input type="email" name="email" required>
      <label>Father's Name:</label>
      <input type="text" name="fatherName">
      <label>Father's Place of Birth:</label>
      <input type="text" name="fatherPOB">
      
</div>
<div class="form-step">
<label>Mother's Name:</label>
      <input type="text" name="motherName">
      <label>Mother's Place of Birth:</label>
      <input type="text" name="motherPOB">

      <h3>Document Uploads</h3>
      <label>Passport Photo:</label>
      <input type="file" name="passportPhoto" accept="image/*" required>
      <label>Copy of Birth Certificate or ID:</label>
      <input type="file" name="idCopy" accept="image/*,.pdf" required>

      <h3>Declaration</h3>
      
</div>
<div class="form-step">
<label>Have you ever held a Marshallese passport?</label>
      <input type="radio" name="hasPassport" value="Yes" required> Yes
      <input type="radio" name="hasPassport" value="No"> No
      <label>Signature:</label>
      <input type="text" name="signature" required>
      <label>Date:</label>
      <input type="date" name="applicationDate" required>

      <button type="submit">Submit Application</button>
    
</div>
<div class="buttons">
  <button type="button" id="backButton">Back</button>
  <button type="button" id="nextButton">Next</button>
  <button type="submit" id="submitButton" style="display: none;">Submit</button>
</div>

</form>
  </div>
  <script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  let currentStep = 0;
  const steps = document.querySelectorAll(".form-step");
  const nextBtn = document.getElementById("nextButton");
  const backBtn = document.getElementById("backButton");
  const submitBtn = document.getElementById("submitButton");
  const progressBar = document.getElementById("progressBar");

  function showStep(index) {
    steps.forEach((step, i) => {
      step.classList.toggle("active", i === index);
    });
    if (index === 0) {
      backBtn.style.display = "none";
    } else {
      backBtn.style.display = "inline-block";
    }
    if (index === steps.length - 1) {
      nextBtn.style.display = "none";
      submitBtn.style.display = "inline-block";
    } else {
      nextBtn.style.display = "inline-block";
      submitBtn.style.display = "none";
    }
    updateProgress(index);
  }

  function updateProgress(index) {
    const percent = ((index + 1) / steps.length) * 100;
    if (progressBar) {
      progressBar.style.width = percent + "%";
    }
  }

  if (nextBtn) {
    nextBtn.addEventListener("click", () => {
      if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
      }
    });
  }

  if (backBtn) {
    backBtn.addEventListener("click", () => {
      if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
      }
    });
  }

  showStep(currentStep);
});
</script>

</body>
</html>
