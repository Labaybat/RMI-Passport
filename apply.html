
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Passport Application</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7f9;
      padding: 2rem;
    }
    .container {
      background: white;
      padding: 2rem;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      max-width: 800px;
      margin: auto;
    }
    h2 {
      text-align: center;
    }
    .step {
      display: none;
    }
    .step.active {
      display: block;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin: 0.5rem 0 1rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: white;
      cursor: pointer;
    }
    #loader {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0.8);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    .loader-box {
      border: 5px solid #ccc;
      border-top: 5px solid #007BFF;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }
  </style>
</head>
<body>
<div id="loader"><div class="loader-box"></div></div>
<div class="container">
  <h2>Passport Application</h2>
  <form id="application-form">
    <!-- Step 1 -->
    <div class="step active" id="step-1">
      <h3>Step 1: Personal Information</h3>
      <select id="application_type" required>
        <option value="">Select Application Type</option>
        <option value="new">New Passport</option>
        <option value="renewal">Renewal</option>
      </select>
      <input type="text" id="surname" placeholder="Surname or Family Name" required />
      <input type="text" id="first_middle_names" placeholder="First and Middle Names" required />
      <input type="text" id="social_security_number" placeholder="Social Security Number" required />
      <button type="button" id="next-1">Next</button>
    </div>

    <!-- Step 2 -->
    <div class="step" id="step-2">
      <h3>Step 2: Contact Information</h3>
      <input type="text" id="phone_number" placeholder="Phone Number" required />
      <input type="text" id="city" placeholder="City or Town" required />
      <input type="text" id="postal_code" placeholder="Postal Code" required />
      <button type="button" id="back-2">Back</button>
      <button type="button" id="next-2">Next</button>
    </div>

    <!-- Step 3 -->
    <div class="step" id="step-3">
      <h3>Step 3: Emergency Contact</h3>
      <input type="text" id="emergency_contact_name" placeholder="Contact Name" required />
      <input type="text" id="emergency_contact_phone" placeholder="Contact Phone" required />
      <button type="button" id="back-3">Back</button>
      <button type="submit" id="submit-button">Submit</button>
    </div>
  </form>
</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"></script>\n<script src="supabase.js"></script>
<script src="form.js"></script>

<script>
  supabase.auth.getUser().then(({ data, error }) => {
    if (!data?.user) {
      alert("You must be logged in to access this page.");
      window.location.href = "index.html";
    }
  });
</script>

</body>
</html>
