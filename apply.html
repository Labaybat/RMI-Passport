</div>
<div class="progress-container">

<form id="passport-form">
<div class="form-step active">
<label for="field1">First Name:</label>
<input id="field22" name="firstName" required="" type="text"/>
<label for="field2">Last Name:</label>
<input id="field22" name="lastName" required="" type="text"/>
<label for="field3">Date of Birth:</label>
<input id="field22" name="dob" required="" type="date"/>
</div>
<div class="form-step">
<label for="field4">Place of Birth:</label>
<input id="field22" name="birthPlace" required="" type="text"/>
<label for="field5">Nationality:</label>
<input id="field22" name="nationality" required="" type="text"/>
<label for="field6">Sex:</label>
<select name="sex">
<option>Male</option>
<option>Female</option>
</select>
<label for="field7">Height (ft/in):</label>
<input id="field22" name="height" type="text"/>
</div>
<div class="form-step">
<label for="field8">Eye Color:</label>
<input id="field22" name="eyeColor" type="text"/>
<label for="field9">Hair Color:</label>
<input id="field22" name="hairColor" type="text"/>
<label for="field10">Home Address:</label>
<input id="field22" name="homeAddress" type="text"/>
<label for="field11">Mailing Address:</label>
<input id="field22" name="mailingAddress" type="text"/>
</div>
<div class="form-step">
<label for="field12">Phone:</label>
<input id="field22" name="phone" type="text"/>
<label for="field13">Email:</label>
<input id="field22" name="email" required="" type="email"/>
<label for="field14">Father's Name:</label>
<input id="field22" name="fatherName" type="text"/>
<label for="field15">Father's Place of Birth:</label>
<input id="field22" name="fatherPOB" type="text"/>
</div>
<div class="form-step">
<label for="field16">Mother's Name:</label>
<input id="field22" name="motherName" type="text"/>
<label for="field17">Mother's Place of Birth:</label>
<input id="field22" name="motherPOB" type="text"/>
<h3>Document Uploads</h3>
<label for="field18">Passport Photo:</label>
<input accept="image/*" id="field22" name="passportPhoto" required="" type="file"/>
<label for="field19">Copy of Birth Certificate or ID:</label>
<input accept="image/*,.pdf" id="field22" name="idCopy" required="" type="file"/>
<h3>Declaration</h3>
</div>
<div class="form-step">
<label for="field20">Have you ever held a Marshallese passport?:</label>
<input id="field22" name="hasPassport" required="" type="radio" value="Yes"/> Yes
      <input id="field22" name="hasPassport" type="radio" value="No"/> No
      <label for="field21">Signature:</label>
<input id="field22" name="signature" required="" type="text"/>
<label for="field22">Date:</label>
<input id="field22" name="applicationDate" required="" type="date"/>
<button type="submit">Submit Application</button>
</div>
<div class="buttons">
<button id="backButton" type="button">Back</button>
<button id="nextButton" type="button">Next</button>
<button id="submitButton" style="display: none;" type="submit">Submit</button>
</div>
</form>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {
  let currentStep = 0;
  const steps = document.querySelectorAll(".form-step");
  const nextBtn = document.getElementById("nextButton");
  const backBtn = document.getElementById("backButton");
  const submitBtn = document.getElementById("submitButton");
  const progressBar = document.getElementById("progressBar");

  function showStep(index) {
    steps.forEach((step, i) => {
      step.classList.toggle("active", i === index);
    });
    if (index === 0) {
      backBtn.style.display = "none";
    } else {
      backBtn.style.display = "inline-block";
    }
    if (index === steps.length - 1) {
      nextBtn.style.display = "none";
      submitBtn.style.display = "inline-block";
    } else {
      nextBtn.style.display = "inline-block";
      submitBtn.style.display = "none";
    }
    updateProgress(index);
  }

  function updateProgress(index) {
    const percent = ((index + 1) / steps.length) * 100;
    if (progressBar) {
      progressBar.style.width = percent + "%";
    }
  }

  if (nextBtn) {
    nextBtn.addEventListener("click", () => {
      if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
      }
    });
  }

  if (backBtn) {
    backBtn.addEventListener("click", () => {
      if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
      }
    });
  }

  showStep(currentStep);
});
</script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://injquzndhzqcamtenbum.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImluanF1em5kaHpxY2FtdGVuYnVtIiwicm9sZSI6InB1YmxpYyIsImlhdCI6MTcwNzQxMDE2MSwiZXhwIjoyMDIzOTg2MTYxfQ.YmH6WqJ3Nk6FbN-QvdqAf4nEPBhnp9Y3ExaUob-AzDI'
);

let currentStep = 0;
const steps = document.querySelectorAll(".form-step");
const nextBtn = document.getElementById("nextButton");
const backBtn = document.getElementById("backButton");
const submitBtn = document.getElementById("submitButton");
const progressBar = document.getElementById("progressBar");
const form = document.getElementById("passport-form");

// Load existing application if logged in
async function loadSavedData() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const user = session.user;
    const { data, error } = await supabase
      .from("passport_applications")
      .select("*")
      .eq("user_id", user.id)
      .single();

    if (data && data.form_data) {
      Object.entries(data.form_data).forEach(([key, value]) => {
        const el = document.querySelector(`[name='${key}']`);
        if (el) el.value = value;
      });
    }
  }
}

// Save current step data
async function saveCurrentStep() {
  const formData = new FormData(form);
  const dataToSave = {};
  formData.forEach((val, key) => dataToSave[key] = val);

  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    const user = session.user;
    await supabase
      .from("passport_applications")
      .upsert([{ user_id: user.id, form_data: dataToSave }], { onConflict: 'user_id' });
  }
}

// Navigation and display logic
function showStep(index) {
  steps.forEach((step, i) => step.classList.toggle("active", i === index));
  updateProgress(index);
  if (index === 0) {
    backBtn.style.display = "none";
  } else {
    backBtn.style.display = "inline-block";
  }
  if (index === steps.length - 1) {
    nextBtn.style.display = "none";
    submitBtn.style.display = "inline-block";
  } else {
    nextBtn.style.display = "inline-block";
    submitBtn.style.display = "none";
  }
}

function updateProgress(index) {
  const percent = ((index + 1) / steps.length) * 100;
  if (progressBar) {
    progressBar.style.width = percent + "%";
  }
}

// Event listeners
if (nextBtn) {
  nextBtn.addEventListener("click", async () => {
    await saveCurrentStep();
    if (currentStep < steps.length - 1) {
      currentStep++;
      showStep(currentStep);
    }
  });
}

if (backBtn) {
  backBtn.addEventListener("click", () => {
    if (currentStep > 0) {
      currentStep--;
      showStep(currentStep);
    }
  });
}

document.addEventListener("DOMContentLoaded", async () => {
  await loadSavedData();
  showStep(currentStep);
});
</script>
