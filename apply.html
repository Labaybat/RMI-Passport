
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Passport Application</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f6f8;
    }
    header {
      background-color: #003366;
      color: white;
      text-align: center;
      padding: 1rem 0;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 999;
    }
    main {
      padding: 6rem 1rem 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    form {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }
    .form-step {
      display: none;
    }
    .form-step.active {
      display: block;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 0.5rem;
    }
    input, select {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .buttons {
      text-align: center;
      margin-top: 2rem;
    }
    .buttons button {
      padding: 0.6rem 1.5rem;
      margin: 0 0.5rem;
      border: none;
      background-color: #003366;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .buttons button:hover {
      background-color: #0055a5;
    }
  
    .progress-container {
      width: 100%;
      background: #ddd;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .progress-bar {
      height: 10px;
      background-color: #003366;
      width: 33%;
      transition: width 0.3s ease-in-out;
    }

</style>
</head>
<body>
  <header>
    <img src="seal.png" alt="Seal" style="height: 60px; vertical-align: middle;">
    <h2 style="display: inline; margin-left: 1rem;">Passport Application</h2>
  </header>
  <main>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

    <form id="passportForm">
      <div class="form-step active" id="step-1">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" name="firstName" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" name="lastName" required>
        </div>
        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" name="dob" required>
        </div>
        <div class="form-group">
          <label for="birthPlace">Place of Birth</label>
          <input type="text" name="birthPlace" required>
        </div>
      </div>

      <div class="form-step" id="step-2">
        <div class="form-group">
          <label for="nationality">Nationality</label>
          <input type="text" name="nationality">
        </div>
        <div class="form-group">
          <label for="sex">Sex</label>
          <input type="text" name="sex">
        </div>
        <div class="form-group">
          <label for="height">Height</label>
          <input type="text" name="height">
        </div>
        <div class="form-group">
          <label for="eyeColor">Eye Color</label>
          <input type="text" name="eyeColor">
        </div>
      </div>

      <div class="form-step" id="step-3">
        <div class="form-group">
          <label for="hairColor">Hair Color</label>
          <input type="text" name="hairColor">
        </div>
        <div class="form-group">
          <label for="homeAddress">Home Address</label>
          <input type="text" name="homeAddress">
        </div>
      </div>

      <div class="buttons">
        <button type="button" >Back</button>
        <button type="button" >Save</button>
        <button type="button" >Next</button>
      </div>
    </form>
  
<div id="confirmationScreen" style="display: none; text-align: center; padding: 2rem;">
  <h2 style="color: #003366;">✅ Application Submitted!</h2>
  <p>Thank you for submitting your passport application. You will be redirected to your dashboard shortly.</p>
</div>

</main>

  <script>
    const SUPABASE_URL = "https://injquzndhzqcamtenbum.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImluanF1em5kaHpxY2FtdGVuYnVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDM2MzA4NzYsImV4cCI6MjAyOTEwNjg3Nn0.AkHgW3ylGnWk1WxHRX9ab-JCcePHhPSDCVxJkFHRPog";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentStep = 1;
    function showStep(step) {
      document.querySelectorAll('.form-step').forEach((stepDiv, index) => {
        stepDiv.classList.remove('active');
        if (index + 1 === step) {
          stepDiv.classList.add('active');
        }
      });
    }
    function nextStep() {
      saveProgress();
      if (currentStep < 3) currentStep++;
      showStep(currentStep);
    }
    function prevStep() {
      if (currentStep > 1) currentStep--;
      showStep(currentStep);
    }
    async function saveProgress() {
      const form = document.getElementById('passportForm');
      const formData = new FormData(form);
      const data = {};
      for (let [key, value] of formData.entries()) {
        data[key] = value;
      }

      const { error } = await supabase
        .from("passport_applications")
        .upsert([data], { onConflict: ['email'] });

      if (error) {
        alert("Error saving progress: " + error.message);
      } else } else if (currentStep === 3) {
        document.getElementById('passportForm').style.display = 'none';
        document.getElementById('confirmationScreen').style.display = 'block';
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 3000);
      }
    }

    window.onload = () => showStep(currentStep);
  </script>

<script>
document.addEventListener("DOMContentLoaded", () => {
  let currentStep = 0;
  const steps = document.querySelectorAll(".form-step");
  const nextBtn = document.getElementById("nextButton");
  const backBtn = document.getElementById("backButton");
  const progressBar = document.getElementById("progressBar");

  function showStep(index) {
    steps.forEach((step, i) => {
      step.classList.toggle("active", i === index);
    });
    updateProgress(index);
  }

  function updateProgress(stepIndex) {
    const percent = ((stepIndex + 1) / steps.length) * 100;
    progressBar.style.width = percent + "%";
  }

  if (nextBtn) {
    nextBtn.addEventListener("click", () => {
      if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
      }
    });
  }

  if (backBtn) {
    backBtn.addEventListener("click", () => {
      if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
      }
    });
  }

  // Initialize
  showStep(currentStep);
});
</script>
