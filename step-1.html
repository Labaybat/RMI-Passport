<!DOCTYPE html>

<html lang="en">
<head>
<style>

<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Step 1 – Personal Information</title>
<link href="../styles.css" rel="stylesheet"/>
</head>
<body><a href="login.html" id="auth-button">Login</a>
<div class="container">
<h1>Passport Application – Step 1 of 5</h1>
<h2><button class="btn-primary" id="logout-btn" style="float:right;margin-top:-40px;">Logout</button>Personal Information</h2>
<div style="margin-top:20px;margin-bottom:20px;">
<h2 style="color:#003366;">Step 1 of 5 – Personal Information</h2>
<div style="background:#e0e0e0;border-radius:4px;height:8px;overflow:hidden;">
<div style="width:20%;background:#003366;height:8px;"></div>
</div>
</div>
<form action="step-2.html" method="get">
<input name="first_name" placeholder="First Name" required="" type="text"/>
<input name="middle_name" placeholder="Middle Name" type="text"/>
<input name="last_name" placeholder="Last Name" required="" type="text"/>
<input name="dob" placeholder="Date of Birth" required="" type="date"/>
<input name="place_of_birth" placeholder="Place of Birth" required="" type="text"/>
<select name="gender" required="">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
<select name="marital_status" required="">
<option value="">Marital Status</option>
<option>Single</option>
<option>Married</option>
<option>Divorced</option>
<option>Widowed</option>
</select>
<input name="ssn" placeholder="Social Security Number" required="" type="text"/>
<input name="nationality" placeholder="Nationality" required="" type="text"/>
<select name="passport_type" required="">
<option value="">Passport Type</option>
<option>Regular</option>
<option>Official</option>
<option>Diplomatic</option>
</select>
<div style="margin-top: 20px; display: flex; justify-content: space-between;">
<a href="index.html" style="background: #ccc; padding: 10px 20px; border-radius: 5px; text-decoration: none;">Back</a>
<button style="background: #003c8f; color: white; padding: 10px 20px; border: none; border-radius: 5px;" type="submit">Next</button>
<button onclick='alert("Progress saved!")' style="background: #555; color: white; padding: 10px 20px; border: none; border-radius: 5px;" type="button">Save</button>
</div>
</form>
<div id="autosave-msg" style="display:none; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 10px; margin-top: 10px; border-radius: 5px;">
      ✅ Progress saved.
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.querySelector("form");
      const saved = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
      if (saved["first_name"]) form["first_name"].value = saved["first_name"];
      if (saved["middle_name"]) form["middle_name"].value = saved["middle_name"];
      if (saved["last_name"]) form["last_name"].value = saved["last_name"];
      if (saved["dob"]) form["dob"].value = saved["dob"];
      if (saved["place_of_birth"]) form["place_of_birth"].value = saved["place_of_birth"];
      if (saved["gender"]) form["gender"].value = saved["gender"];
      if (saved["marital_status"]) form["marital_status"].value = saved["marital_status"];
      if (saved["ssn"]) form["ssn"].value = saved["ssn"];
      if (saved["nationality"]) form["nationality"].value = saved["nationality"];
      if (saved["passport_type"]) form["passport_type"].value = saved["passport_type"];

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const data = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
        data["first_name"] = form["first_name"].value;
        data["middle_name"] = form["middle_name"].value;
        data["last_name"] = form["last_name"].value;
        data["dob"] = form["dob"].value;
        data["place_of_birth"] = form["place_of_birth"].value;
        data["gender"] = form["gender"].value;
        data["marital_status"] = form["marital_status"].value;
        data["ssn"] = form["ssn"].value;
        data["nationality"] = form["nationality"].value;
        data["passport_type"] = form["passport_type"].value;
        localStorage.setItem("passport_application_data", JSON.stringify(data));
        window.location.href = "step-2.html";
      });
    });
  </script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.querySelector("form");
      const saved = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
      const isFirst = true;
      
      if (isFirst && Object.keys(saved).length > 0) {
        if (confirm("Resume previous application?")) {
          if (saved["first_name"]) form["first_name"].value = saved["first_name"];
      if (saved["middle_name"]) form["middle_name"].value = saved["middle_name"];
      if (saved["last_name"]) form["last_name"].value = saved["last_name"];
      if (saved["dob"]) form["dob"].value = saved["dob"];
      if (saved["place_of_birth"]) form["place_of_birth"].value = saved["place_of_birth"];
      if (saved["gender"]) form["gender"].value = saved["gender"];
      if (saved["marital_status"]) form["marital_status"].value = saved["marital_status"];
      if (saved["ssn"]) form["ssn"].value = saved["ssn"];
      if (saved["nationality"]) form["nationality"].value = saved["nationality"];
      if (saved["passport_type"]) form["passport_type"].value = saved["passport_type"];
        } else {
          localStorage.removeItem("passport_application_data");
        }
      }
    

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const data = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
        data["first_name"] = form["first_name"].value;
        data["middle_name"] = form["middle_name"].value;
        data["last_name"] = form["last_name"].value;
        data["dob"] = form["dob"].value;
        data["place_of_birth"] = form["place_of_birth"].value;
        data["gender"] = form["gender"].value;
        data["marital_status"] = form["marital_status"].value;
        data["ssn"] = form["ssn"].value;
        data["nationality"] = form["nationality"].value;
        data["passport_type"] = form["passport_type"].value;
        localStorage.setItem("passport_application_data", JSON.stringify(data));
        window.location.href = "step-2.html";
      });

      // Save button logic
      const saveBtn = document.querySelector(".btn-save");
      if (saveBtn) {
        saveBtn.addEventListener("click", () => {
          const data = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
          data["first_name"] = form["first_name"].value;
        data["middle_name"] = form["middle_name"].value;
        data["last_name"] = form["last_name"].value;
        data["dob"] = form["dob"].value;
        data["place_of_birth"] = form["place_of_birth"].value;
        data["gender"] = form["gender"].value;
        data["marital_status"] = form["marital_status"].value;
        data["ssn"] = form["ssn"].value;
        data["nationality"] = form["nationality"].value;
        data["passport_type"] = form["passport_type"].value;
          localStorage.setItem("passport_application_data", JSON.stringify(data));
          const msg = document.getElementById("autosave-msg");
          if (msg) {
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 3000);
          }
        });
      }
    });
  </script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabase = createClient('https://svkusntallxdxrsgdqzt.supabase.co', 'public-anon-key');
const { data: { user } } = await supabase.auth.getUser();
const btn = document.getElementById("auth-button");
if (btn) {
  if (user) {
    btn.textContent = "Logout";
    btn.href = "#";
    btn.onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    };
  } else {
    btn.textContent = "Login";
    btn.href = "login.html";
  }
}
</script></body>
</html>
