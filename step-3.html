<body>
<a id="auth-toggle" style="position:absolute;top:20px;right:20px;color:#003366;font-weight:bold;text-decoration:none;">Auth</a>

    <h1>Passport Application – Step 3 of 5</h1>
    <h2>Citizenship Verification</h2>
    
    <div style="margin-top:20px;margin-bottom:20px;">
      <h2 style="color:#003366;">Step 3 of 5 – Employment & Physical Info</h2>
      <div style="background:#e0e0e0;border-radius:4px;height:8px;overflow:hidden;">
        <div style="width:60%;background:#003366;height:8px;"></div>
      </div>
    </div>
    
<form action="step-4.html" method="get" enctype="multipart/form-data">
      <input type="text" name="passport_number" placeholder="Previous Passport Number (if any)" />
      <input type="text" name="nid" placeholder="National ID Number" />
      <label>Upload Birth Certificate:</label>
      <input type="file" name="birth_certificate" accept=".pdf,.jpg,.jpeg,.png" required />
      <label>Upload Social Security Card:</label>
      <input type="file" name="ss_card" accept=".pdf,.jpg,.jpeg,.png" />
      <label>Upload Proof of Citizenship (if applicable):</label>
      <input type="file" name="citizenship_proof" accept=".pdf,.jpg,.jpeg,.png" />
      
<div style='margin-top: 20px; display: flex; justify-content: space-between;'>
  <a href='step-2.html' style='background: #ccc; padding: 10px 20px; border-radius: 5px; text-decoration: none;'>Back</a>
  <button type='submit' style='background: #003c8f; color: white; padding: 10px 20px; border: none; border-radius: 5px;'>Next</button>
  <button type='button' onclick='alert("Progress saved!")' style='background: #555; color: white; padding: 10px 20px; border: none; border-radius: 5px;'>Save</button>
</div>

    </form>

    <div id="autosave-msg" style="display:none; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 10px; margin-top: 10px; border-radius: 5px;">
      ✅ Progress saved.
    </div>
    
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.querySelector("form");
      const saved = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
      if (saved["occupation"]) form["occupation"].value = saved["occupation"];
      if (saved["employer_name"]) form["employer_name"].value = saved["employer_name"];
      if (saved["employer_address"]) form["employer_address"].value = saved["employer_address"];
      if (saved["height"]) form["height"].value = saved["height"];
      if (saved["hair_color"]) form["hair_color"].value = saved["hair_color"];
      if (saved["eye_color"]) form["eye_color"].value = saved["eye_color"];

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const data = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
        data["occupation"] = form["occupation"].value;
        data["employer_name"] = form["employer_name"].value;
        data["employer_address"] = form["employer_address"].value;
        data["height"] = form["height"].value;
        data["hair_color"] = form["hair_color"].value;
        data["eye_color"] = form["eye_color"].value;
        localStorage.setItem("passport_application_data", JSON.stringify(data));
        window.location.href = "step-4.html";
      });
    });
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.querySelector("form");

      if (saved["employer_address"]) form["employer_address"].value = saved["employer_address"];

      if (saved["eye_color"]) form["eye_color"].value = saved["eye_color"];

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const data = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
        data["occupation"] = form["occupation"].value;
        data["employer_name"] = form["employer_name"].value;
        data["employer_address"] = form["employer_address"].value;
        data["height"] = form["height"].value;
        data["hair_color"] = form["hair_color"].value;
        data["eye_color"] = form["eye_color"].value;
        localStorage.setItem("passport_application_data", JSON.stringify(data));
        window.location.href = "step-4.html";
      });

      // Save button logic
      const saveBtn = document.querySelector(".btn-save");
      if (saveBtn) {
        saveBtn.addEventListener("click", () => {
          const data = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
          data["occupation"] = form["occupation"].value;
        data["employer_name"] = form["employer_name"].value;
        data["employer_address"] = form["employer_address"].value;
        data["height"] = form["height"].value;
        data["hair_color"] = form["hair_color"].value;
        data["eye_color"] = form["eye_color"].value;
          localStorage.setItem("passport_application_data", JSON.stringify(data));
          const msg = document.getElementById("autosave-msg");
          if (msg) {
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 3000);
          }
        });
      }
    });
  </script>
