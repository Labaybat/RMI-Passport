<!DOCTYPE html>

<html lang="en">
<head>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    color: #222;
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 600px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
  }
  h1, h2 {
    color: #003366;
    text-align: center;
  }
  input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
  }
  .form-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 25px;
  }
  .form-nav button,
  .form-nav a {
    padding: 10px 20px;
    border-radius: 5px;
    font-weight: bold;
    text-decoration: none;
    text-align: center;
  }
  .btn-next {
    background-color: #003c8f;
    color: white;
    border: none;
  }
  .btn-back {
    background-color: #ccc;
    color: black;
  }
  .btn-save {
    background-color: #555;
    color: white;
    border: none;
  }
</style>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Step 3 – Citizenship Verification</title>
<link href="../styles.css" rel="stylesheet"/>
</head>
<body><a href="login.html" id="auth-button">Login</a>
<div class="container">
<h1>Passport Application – Step 3 of 5</h1>
<h2><button class="btn-primary" id="logout-btn" style="float:right;margin-top:-40px;">Logout</button>Citizenship Verification</h2>
<div style="margin-top:20px;margin-bottom:20px;">
<h2 style="color:#003366;">Step 3 of 5 – Employment &amp; Physical Info</h2>
<div style="background:#e0e0e0;border-radius:4px;height:8px;overflow:hidden;">
<div style="width:60%;background:#003366;height:8px;"></div>
</div>
</div>
<form action="step-4.html" enctype="multipart/form-data" method="get">
<input name="passport_number" placeholder="Previous Passport Number (if any)" type="text"/>
<input name="nid" placeholder="National ID Number" type="text"/>
<label>Upload Birth Certificate:</label>
<input accept=".pdf,.jpg,.jpeg,.png" name="birth_certificate" required="" type="file"/>
<label>Upload Social Security Card:</label>
<input accept=".pdf,.jpg,.jpeg,.png" name="ss_card" type="file"/>
<label>Upload Proof of Citizenship (if applicable):</label>
<input accept=".pdf,.jpg,.jpeg,.png" name="citizenship_proof" type="file"/>
<div style="margin-top: 20px; display: flex; justify-content: space-between;">
<a href="step-2.html" style="background: #ccc; padding: 10px 20px; border-radius: 5px; text-decoration: none;">Back</a>
<button style="background: #003c8f; color: white; padding: 10px 20px; border: none; border-radius: 5px;" type="submit">Next</button>
<button onclick='alert("Progress saved!")' style="background: #555; color: white; padding: 10px 20px; border: none; border-radius: 5px;" type="button">Save</button>
</div>
</form>
<div id="autosave-msg" style="display:none; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; padding: 10px; margin-top: 10px; border-radius: 5px;">
      ✅ Progress saved.
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.querySelector("form");
      const saved = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
      if (saved["occupation"]) form["occupation"].value = saved["occupation"];
      if (saved["employer_name"]) form["employer_name"].value = saved["employer_name"];
      if (saved["employer_address"]) form["employer_address"].value = saved["employer_address"];
      if (saved["height"]) form["height"].value = saved["height"];
      if (saved["hair_color"]) form["hair_color"].value = saved["hair_color"];
      if (saved["eye_color"]) form["eye_color"].value = saved["eye_color"];

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const data = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
        data["occupation"] = form["occupation"].value;
        data["employer_name"] = form["employer_name"].value;
        data["employer_address"] = form["employer_address"].value;
        data["height"] = form["height"].value;
        data["hair_color"] = form["hair_color"].value;
        data["eye_color"] = form["eye_color"].value;
        localStorage.setItem("passport_application_data", JSON.stringify(data));
        window.location.href = "step-4.html";
      });
    });
  </script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
      const form = document.querySelector("form");
      const saved = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
      const isFirst = false;
      if (saved["occupation"]) form["occupation"].value = saved["occupation"];
      if (saved["employer_name"]) form["employer_name"].value = saved["employer_name"];
      if (saved["employer_address"]) form["employer_address"].value = saved["employer_address"];
      if (saved["height"]) form["height"].value = saved["height"];
      if (saved["hair_color"]) form["hair_color"].value = saved["hair_color"];
      if (saved["eye_color"]) form["eye_color"].value = saved["eye_color"];

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const data = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
        data["occupation"] = form["occupation"].value;
        data["employer_name"] = form["employer_name"].value;
        data["employer_address"] = form["employer_address"].value;
        data["height"] = form["height"].value;
        data["hair_color"] = form["hair_color"].value;
        data["eye_color"] = form["eye_color"].value;
        localStorage.setItem("passport_application_data", JSON.stringify(data));
        window.location.href = "step-4.html";
      });

      // Save button logic
      const saveBtn = document.querySelector(".btn-save");
      if (saveBtn) {
        saveBtn.addEventListener("click", () => {
          const data = JSON.parse(localStorage.getItem("passport_application_data") || "{}");
          data["occupation"] = form["occupation"].value;
        data["employer_name"] = form["employer_name"].value;
        data["employer_address"] = form["employer_address"].value;
        data["height"] = form["height"].value;
        data["hair_color"] = form["hair_color"].value;
        data["eye_color"] = form["eye_color"].value;
          localStorage.setItem("passport_application_data", JSON.stringify(data));
          const msg = document.getElementById("autosave-msg");
          if (msg) {
            msg.style.display = "block";
            setTimeout(() => msg.style.display = "none", 3000);
          }
        });
      }
    });
  </script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabase = createClient('https://svkusntallxdxrsgdqzt.supabase.co', 'public-anon-key');
const { data: { user } } = await supabase.auth.getUser();
const btn = document.getElementById("auth-button");
if (btn) {
  if (user) {
    btn.textContent = "Logout";
    btn.href = "#";
    btn.onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    };
  } else {
    btn.textContent = "Login";
    btn.href = "login.html";
  }
}
</script></body>
</html>
