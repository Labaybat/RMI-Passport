<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Admin Dashboard – RMI Passport Portal</title>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="styles.css" rel="stylesheet"/>
<script src="auth.js" type="module"></script>
<style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f8fafc;
      padding: 20px;
    }
    .dashboard {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 {
      color: #002855;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ccc;
      text-align: left;
    }
    th {
      background-color: #002855;
      color: white;
    }
    select {
      padding: 6px;
    }
    .filter-section {
      margin-top: 15px;
    }
    .status {
      font-weight: bold;
      color: #004085;
    }
  </style>

</head>
<body><a href="login.html" id="auth-button">Login</a>
<div class="dashboard">
<h1>Admin Dashboard</h1>
<p style="text-align:center;">Only accessible to: <strong>superadmin@example.com</strong></p>
<div class="filter-section">
<!-- Filter UI (optional future) -->
</div>
<table>
<thead>
<tr>
<th>Date</th>
<th>Name</th>
<th>Email</th>
<th>Type</th>
<th>Status</th>
</tr>
</thead>
<tbody id="admin-table">
<tr><td colspan="6">Loading applications...</td></tr>
</tbody>
</table>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const supabase = createClient('https://svkusntallxdxrsgdqzt.supabase.co', 'public-anon-key');
const { data: { user } } = await supabase.auth.getUser();
const btn = document.getElementById("auth-button");
if (btn) {
  if (user) {
    btn.textContent = "Logout";
    btn.href = "#";
    btn.onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    };
  } else {
    btn.textContent = "Login";
    btn.href = "login.html";
  }
}
</script></body>
</html>
