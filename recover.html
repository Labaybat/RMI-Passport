<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Password Recovery</title>
<link href="style.css" rel="stylesheet"/>
</head>
<body class="scroll-page">
<div class="auth-center-container">
<div class="container">
<h1 class="login-title">RMI PASSPORT PORTAL</h1>
<div class="login-avatar">
<svg fill="#cccccc" height="72" viewbox="0 0 24 24" width="72">
<circle cx="12" cy="8" r="4"></circle>
<path d="M4 20c0-4 4-6 8-6s8 2 8 6v1H4v-1z"></path>
</svg>
</div>
<h2 class="login-subtitle">Password Recovery</h2>
<form id="recover-form">
<div class="form-group">
<input class="form-control" id="email1" placeholder="Enter your registered email address" required="" type="email"/>
</div>
<div class="form-group">
<input class="form-control" id="email2" placeholder="Re-enter your email address" required="" type="email"/>
</div>
<div class="error-message" id="error-message" style="display:none; text-align:center; margin: 10px 0;"></div>
<div class="form-group">
<div class="form-group"><button class="login-button" type="submit">Send</button></div><div class="signup-link" style="margin-top: 10px; text-align: center; font-size: 14px;">Don’t have an account? <a href="signup.html">Sign up</a></div>
</div>
</form>
<p class="footer">PASSPORT</p>
</div>
<script src="recover-auth.js" type="module"></script>
</div></body>
</html>
