
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Passport Application for Child</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f6f8;
    }
    header {
      background-color: #003366;
      color: white;
      text-align: center;
      padding: 1rem 0;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 999;
    }
    main {
      padding: 6rem 1rem 2rem;
      max-width: 600px;
      margin: 0 auto;
    }
    form {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }
    .form-step {
      display: none;
    }
    .form-step.active {
      display: block;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    label {
      font-weight: bold;
      display: block;
      margin-bottom: 0.5rem;
    }
    input, select {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .buttons {
      text-align: center;
      margin-top: 2rem;
    }
    .buttons button {
      padding: 0.6rem 1.5rem;
      margin: 0 0.5rem;
      border: none;
      background-color: #003366;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .buttons button:hover {
      background-color: #0055a5;
    }
  
    .progress-container {
      width: 100%;
      background: #ddd;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .progress-bar {
      height: 10px;
      background-color: #003366;
      width: 33%;
      transition: width 0.3s ease-in-out;
    }

</style>
</head>
<body>
  <header>
    <img src="seal.png" alt="Seal" style="height: 60px; vertical-align: middle;">
    <h2 style="display: inline; margin-left: 1rem;">Passport Application for Child</h2>
  </header>
  <main>

<div class="progress-container">
  <div class="progress-bar" id="progressBar"></div>
</div>

    <form id="passportForm">
      <div class="form-step active" id="step-1">
        <div class="form-group">
          <label for="firstName">What is your child's first name?</label>
          <input type="text" name="firstName" required>
        </div>
        <div class="form-group">
          <label for="lastName">What is your child's last name?</label>
          <input type="text" name="lastName" required>
        </div>
        <div class="form-group">
          <label for="dob">What is your child's date of birth?</label>
          <input type="date" name="dob" required>
        </div>
        <div class="form-group">
          <label for="birthPlace">Where was your child born?</label>
          <input type="text" name="birthPlace" required>
        </div>
      </div>

      <div class="form-step" id="step-2">
        <div class="form-group">
          <label for="nationality">What is your child's nationality?</label>
          <input type="text" name="nationality">
        </div>
        <div class="form-group">
          <label for="sex">What is your child's sex?</label>
          <input type="text" name="sex">
        </div>
        <div class="form-group">
          <label for="height">What is your child's height?</label>
          <input type="text" name="height">
        </div>
        <div class="form-group">
          <label for="eyeColor">What is your child's eye color?</label>
          <input type="text" name="eyeColor">
        </div>
      </div>

      <div class="form-step" id="step-3">
        <div class="form-group">
          <label for="hairColor">What is your child's hair color?</label>
          <input type="text" name="hairColor">
        </div>
        <div class="form-group">
          <label for="homeAddress">What is your child's home address?</label>
          <input type="text" name="homeAddress">
        </div>
      </div>

      <div class="buttons">
        <button type="button" >Back</button>
        <button type="button" >Save</button>
        <button type="button" >Next</button>
      </div>
    </form>
  
<div id="confirmationScreen" style="display: none; text-align: center; padding: 2rem;">
  <h2 style="color: #003366;">✅ Application Submitted!</h2>
  <p>Thank you for submitting your passport application. You will be redirected to your dashboard shortly.</p>
</div>

</main>

  







<script>
document.addEventListener("DOMContentLoaded", function () {
  let currentStep = 0;
  const steps = document.querySelectorAll(".form-step");
  const nextBtn = document.getElementById("nextButton");
  const backBtn = document.getElementById("backButton");
  const progressBar = document.getElementById("progressBar");

  function showStep(index) {
    steps.forEach((step, i) => {
      step.classList.toggle("active", i === index);
    });
    updateProgress(index);
  }

  function updateProgress(index) {
    const percent = ((index + 1) / steps.length) * 100;
    if (progressBar) {
      progressBar.style.width = percent + "%";
    }
  }

  if (nextBtn) {
    nextBtn.addEventListener("click", function () {
      if (currentStep < steps.length - 1) {
        currentStep++;
        showStep(currentStep);
      }
    });
  }

  if (backBtn) {
    backBtn.addEventListener("click", function () {
      if (currentStep > 0) {
        currentStep--;
        showStep(currentStep);
      }
    });
  }

  showStep(currentStep);
});
</script>

</body>
</html>
