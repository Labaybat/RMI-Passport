<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    color: #222;
    margin: 0;
    padding: 0;
  }
  .container {
    max-width: 600px;
    margin: 60px auto;

    padding: 30px;
    border-radius: 10px;

  }
  h1, h2 {
    color: #003366;
    text-align: center;
  }
  input, select, textarea {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
  }
  .form-nav {
    display: flex;
    justify-content: space-between;
    margin-top: 25px;
  }
  .form-nav button,
  .form-nav a {
    padding: 10px 20px;
    border-radius: 5px;
    font-weight: bold;
    text-decoration: none;
    text-align: center;
  }
  .btn-next {
    background-color: #003c8f;
    color: white;
    border: none;
  }
  .btn-back {

    border: none;
  }

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="container">
    <h1>Passport Application – Step 4 of 5</h1>
    <h2>Emergency Contact</h2>
    <form action="step-5.html" method="get">

      <input type="text" name="relationship" placeholder="Relationship" required />
      <input type="tel" name="emergency_phone" placeholder="Phone Number" required />
      <input type="text" name="emergency_address" placeholder="Address" required />
      
<div style='margin-top: 20px; display: flex; justify-content: space-between;'>
  <a href='step-3.html' style='background: #ccc; padding: 10px 20px; border-radius: 5px; text-decoration: none;'>Back</a>
  <button type='submit' style='background: #003c8f; color: white; padding: 10px 20px; border: none; border-radius: 5px;'>Next</button>
  <button type='button' onclick='alert("Progress saved!")' style='background: #555; color: white; padding: 10px 20px; border: none; border-radius: 5px;'>Save</button>
</div>

    </form>
  </div>
