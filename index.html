
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RMI Passport Portal - Login</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      background-color: #f4f6f9;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #2c3e50;
    }
    .login-wrapper {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .login-card {
      background: #ffffff;
      padding: 24px 32px;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 360px;
    }
    .login-card h1 {
      font-size: 18px;
      font-weight: 600;
      color: #003366;
      margin-bottom: 16px;
      text-align: center;
    }
    .login-card input {
      width: 100%;
      padding: 10px;
      margin-bottom: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .login-card button {
      width: 100%;
      padding: 10px;
      background-color: #003366;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    .login-card button:hover {
      background-color: #0055a5;
    }
    .login-card .footer {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
    }
    .login-card .footer a {
      color: #003366;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <h1>RMI Passport Portal</h1>
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button onclick="login()">Sign In</button>
      <div class="footer">
        Don't have an account? <a href="#" onclick="goToSignup()">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
