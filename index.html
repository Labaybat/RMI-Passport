<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RMI Passport – Home</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f2f7fc;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .header {
      background-color: #002e5b;
      color: white;
      padding: 1rem;
      position: relative;
    }
    .header h1 {
      margin: 0;
    }
    #login-btn {
      position: absolute;
      top: 15px;
      right: 30px;
      padding: 10px 16px;
      background-color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .main-content {
      padding: 3rem 1rem;
    }
    button.action {
      background-color: #003c8f;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      margin: 10px;
      font-size: 1rem;
      cursor: pointer;
    }
    button.action:hover {
      background-color: #002a6c;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Republic of the Marshall Islands – Passport Portal</h1>
    <button id="login-btn">Login</button>
  </div>

  <div class="main-content">
    <h2>Welcome to the Passport Portal</h2>
    <p>Use the options below to continue.</p>
    <button class="action" onclick="window.location.href='step-1.html'">Start Application</button>
    <button class="action" onclick="window.location.href='dashboard.html'">Go to Dashboard</button>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const supabase = createClient('https://svkusntallxdxrsgdqzt.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2a3VzbnRhbGx4ZHhyc2dkcXp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDY0OTE3NjMsImV4cCI6MjA2MjA2Nzc2M30.-vsOMTTOo8cX5ejbIjwoEGskFx_FZ-yYqVX4EbSDPGQ');

    const loginBtn = document.getElementById('login-btn');
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (!session) {
        window.location.href = '/login.html';
      } else {
        loginBtn.textContent = 'Logout';
        loginBtn.onclick = async () => {
          await supabase.auth.signOut();
          window.location.href = '/login.html';
        };
      }
    });
  </script>
</body>
</html>
