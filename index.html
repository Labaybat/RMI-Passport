
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RMI Passport Portal - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1 style="text-align:center;">RMI Passport Portal</h1>
    <form id="login-form">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Login</button>
      <p><a href="#" id="signup-link">Don’t have an account? Sign up</a></p>
    </form>
  </div>
  <script type="module" src="auth.js"></script>

<div id="signup-modal" style="display:none;" class="container">
  <h2>Sign Up</h2>
  <input type="email" id="signup-email" placeholder="Email" required />
  <input type="password" id="signup-password" placeholder="Password" required />
  <button onclick="signupUser()">Create Account</button>
</div>

<script type="module">
import { supabase } from './supabase.js';

document.getElementById('signup-link').addEventListener('click', function(e) {
  e.preventDefault();
  document.getElementById('signup-modal').style.display = 'block';
});

window.signupUser = async function() {
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  const { error } = await supabase.auth.signUp({ email, password });
  if (!error) {
    alert("Signup successful! Check your email to verify your account.");
    document.getElementById('signup-modal').style.display = 'none';
  } else {
    alert('Signup failed: ' + error.message);
  }
}
</script>

</body>
</html>
