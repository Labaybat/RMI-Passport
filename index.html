
<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>RMI Passport Portal - Login</title>
<link href="style.css" rel="stylesheet"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/></head>
<body class="scroll-page"><div class="auth-center-container">
<div class="container">

<h1 class="login-title">RMI PASSPORT PORTAL</h1>
<div class="login-avatar">
  <svg viewBox="0 0 24 24" width="72" height="72" fill="#cccccc">
    <circle cx="12" cy="8" r="4"/>
    <path d="M4 20c0-4 4-6 8-6s8 2 8 6v1H4v-1z"/>
  </svg>
</div>
<h2 class="login-subtitle">Sign In</h2>
<form id="login-form" class="login-form">
  <input id="email" type="email" placeholder="Email address" required>
  
    <div class="password-wrapper">
      <input id="password" type="password" placeholder="Password" required>
      <span class="password-toggle" onclick="togglePasswordVisibility(this)"><svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='#555' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/></svg></span>
    </div>
      <div class="forgot-password">
        <a href="recover.html">Forgot Password?</a>
      </div>
    
  <button type="submit" class="login-button">Sign In</button>
</form>
<p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>
<p class="login-footer">PASSPORT</p>

</div>
<script src="auth.js" type="module"></script>
<!-- Consent Modal -->
<div id="consentModal" style="position:fixed;top:0;left:0;width:100%;height:100%;
background-color:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;">
<div style="background:#fff;padding:20px 30px;border-radius:8px;max-width:500px;text-align:center;box-shadow:0 4px 8px rgba(0,0,0,0.1);">
<h2>Consent Required</h2>
<p>By using this platform, you agree to provide true and accurate information in accordance with the RMI Passport Act 2020.</p>
<button onclick="document.getElementById('consentModal').style.display='none'" style="margin-top:15px;padding:10px 20px;border:none;border-radius:5px;background-color:#003366;color:white;cursor:pointer;">
      I Agree
    </button>
</div>
</div>
</div>
<script>
  function togglePasswordVisibility() {
    const pwdInput = document.getElementById('password');
    pwdInput.type = pwdInput.type === 'password' ? 'text' : 'password';
  }
</script>

<script>
function togglePasswordVisibility(el) {
  const input = el.previousElementSibling;
  const isPassword = input.type === "password";
  input.type = isPassword ? "text" : "password";
  el.innerHTML = isPassword ? `<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='#555' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M17.94 17.94A10.94 10.94 0 0 1 12 20c-4.69 0-8.5-3.81-8.5-8.5a10.94 10.94 0 0 1 1.54-5.5M1 1l22 22'/><path d='M9.88 9.88a3 3 0 0 0 4.24 4.24'/></svg>` : `<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='#555' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z'/><circle cx='12' cy='12' r='3'/></svg>`;
}
</script>

</body>

</html>
